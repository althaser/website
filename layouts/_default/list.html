{{ define "main" }}
<div class="prose dark:prose-invert max-w-none">
  <div class="flex items-center justify-between gap-4">
    <h1 class="standard {{ if eq .Kind `term` }}font-italic{{ end }}">
        {{ if eq .Kind "term" }}#{{ .Data.Term }}{{ else }}{{- .Title -}}{{ end }}
    </h1>
    <a href="{{ `index.xml` | absURL }}" aria-label="RSS feed">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Generic_Feed-icon.svg" alt="blog-rss" class="h-[30px] w-[30px]">
    </a>
  </div>
  {{ range $key, $val := (.Paginator 10).Pages }}
  <div class="accordion-item {{ if eq $key 0 }}active{{ end }}" data-accordion-item>
    <div class="blog-list-item">
      <button
        id="panel-item-{{ $key }}-button"
        type="button"
        data-accordion-trigger
        class="accordion-trigger blog-list-toggle"
        aria-expanded="{{ if eq $key 0 }}true{{ else }}false{{ end }}"
        aria-controls="panel-item-{{ $key }}"
        aria-label="Toggle metadata for {{ .Title }}"
      >
        <i
          class="chevron fas fa-chevron-right text-blue-500 dark:text-gray-400"
          aria-hidden="true"
        ></i>
      </button>
      <h2 class="not-prose accordion m-0 font-bold">
        <a href="{{ .RelPermalink }}">{{- .Title -}}</a>
      </h2>
    </div>
    <div
      id="panel-item-{{ $key }}"
      class="panel metadata-panel overflow-hidden bg-gray-200 dark:bg-dark"
      role="region"
      aria-labelledby="panel-item-{{ $key }}-button"
      {{ if ne $key 0 }}hidden{{ end }}
    >
      <div class="metadata p-2">{{- partial "metadata" . -}}</div>
    </div>
  </div>
  {{ end }}
</div>

<div class="my-6 flex justify-center pagination-links">
  {{ template "_internal/pagination.html" (dict "page" . "format" "terse") }}
</div>
{{ end }}
