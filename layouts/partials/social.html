<h1 class="mb-0">{{ hugo.Data.profile.name }}</h1>
<h2 class="mb-0 text-blue-500">{{ hugo.Data.profile.tagline }}</h2>
<div class="mb-4">{{ hugo.Data.profile.location }}</div>
<div class="mb-4 flex flex-wrap justify-center">
  {{ range $key, $value := hugo.Data.social }}
  <div class="mx-2">
    <a class="text-2xl" href="{{ .url }}">
      <i class="mt-1 {{ $value.icon }}"></i>
    </a>
  </div>
  {{ end }}
</div>
