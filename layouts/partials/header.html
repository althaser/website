<header
  class="nav flex flex-row items-center row py-2 mb-6 w-full border-b border-gray-700 dark:border-gray-300 justify-between"
>
  <div>
    <a class="nav-menu-item {{ if .IsHome }} active {{ end }}" href="{{ `/` | relURL }}">Home</a>
    <a class="nav-menu-item {{ if eq .Section "blog" }} active {{ end }}" href="{{ "blog" | relURL }}">Blog</a>
  </div>

  <div class="flex items-center gap-1">
    <a class="nav-menu-item inline-flex items-center justify-center" href="{{ `search` | relURL }}" aria-label="Search">
      <i class="fas fa-search" aria-hidden="true"></i>
    </a>

    <button
      type="button"
      class="nav-menu-item inline-flex items-center justify-center text-blue-500 hover:text-blue-700 dark:text-yellow-300 dark:hover:text-yellow-500"
      onclick="toggleTheme()"
      aria-label="Toggle theme"
      title="Toggle theme"
    >
      <i class="fas fa-sun theme-toggle" aria-hidden="true"></i>
    </button>
  </div>
</header>
