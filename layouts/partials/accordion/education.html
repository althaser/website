{{ range hugo.Data.education.list }}

{{ partial "accordion/item_heading.html" .degree }}
<p {{ if .thesis_title }}class="mb-0" {{ end }}>
  {{- .dates }} &middot; {{ .college -}}
</p>
{{ if .thesis_title }}
{{ if .thesis_url }}
<p class="ms-2">
  Thesis:
  <a href="{{ .thesis_url }}"><i>{{ .thesis_title }}</i></a>
</p>
{{ else }}
<p>
  Thesis: <i>{{ .thesis_title }}</i>
</p>
{{ end }}
{{ end }}
{{ end }}
