{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "Article image" }}
{{ $width := .Get "width" | strings.TrimSuffix "px" }}
{{ $height := .Get "height" | strings.TrimSuffix "px" }}
{{ $class := .Get "class" | default "content-inline-image" }}

<img
  src="{{ $src }}"
  alt="{{ $alt }}"
  class="{{ $class }}"
  loading="lazy"
  decoding="async"
  {{ with $width }}width="{{ . }}"{{ end }}
  {{ with $height }}height="{{ . }}"{{ end }}
/>
