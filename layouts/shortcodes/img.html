{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "Article image" }}
{{ $width := .Get "width" }}
{{ $height := .Get "height" }}

<img
  src="{{ $src }}"
  alt="{{ $alt }}"
  class="content-inline-image"
  loading="lazy"
  decoding="async"
  {{ with $width }}width="{{ . }}"{{ end }}
  {{ with $height }}height="{{ . }}"{{ end }}
/>
