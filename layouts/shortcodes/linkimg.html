{{ $href := .Get "href" }}
{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "Link image" }}
{{ $label := .Get "label" | default $alt }}
{{ $width := .Get "width" | strings.TrimSuffix "px" }}
{{ $height := .Get "height" | strings.TrimSuffix "px" }}

<a href="{{ $href }}" class="link-image-anchor">
  <img
    src="{{ $src }}"
    alt="{{ $alt }}"
    class="content-inline-image"
    loading="lazy"
    decoding="async"
    {{ with $width }}width="{{ . }}"{{ end }}
    {{ with $height }}height="{{ . }}"{{ end }}
  >
  {{ $label }}
</a>
